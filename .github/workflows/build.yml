name: Build ZMK Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 0

      - name: Init submodules
        run: git submodule update --init --recursive

      - name: Build (ZMK)
        uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
